openapi: 3.0.3
info:
  title: GitHub Gateway API
  version: 0.0.1
servers:
  - url: http://localhost:8080
paths:
  /api/v1/repos/{owner}/{repo}:
    get:
      operationId: GetRepository
      summary: Get GitHub repository info
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Repository info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryResponse'
        '400':
          description: Bad request
        '500':
          description: Internal server error
components:
  schemas:
    RepositoryResponse:
      type: object
      required:
        - owner
        - name
        - description
        - stargazers_count
        - forks_count
        - created_at
      properties:
        owner:
          type: string
        name:
          type: string
        description:
          type: string
        stargazers_count:
          type: integer
          format: int64
        forks_count:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
