services:
  service:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.service
    environment:
      GRPC_ADDR: ":9090"
      GITHUB_API_BASE_URL: "https://api.github.com"
      GITHUB_TIMEOUT: "5s"
    ports:
      - "9090:9090"
    networks:
      - github

  gateway:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.gateway
    depends_on:
      - service
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: "service:9090"
    ports:
      - "8080:8080"
    networks:
      - github

networks:
  github:
    driver: bridge
